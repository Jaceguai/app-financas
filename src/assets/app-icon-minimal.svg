<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Dog silhouette - simplified cute dog -->
  <g transform="translate(512, 520)">
    <!-- Main head -->
    <circle cx="0" cy="0" r="240" fill="#ffffff"/>

    <!-- Left ear -->
    <path d="M -200 -100 Q -280 -300 -160 -220 Q -120 -180 -140 -100" fill="#ffffff"/>
    <!-- Right ear -->
    <path d="M 200 -100 Q 280 -300 160 -220 Q 120 -180 140 -100" fill="#ffffff"/>

    <!-- Inner left ear -->
    <path d="M -180 -120 Q -230 -250 -150 -200" stroke="#fecaca" stroke-width="30" fill="none" stroke-linecap="round"/>
    <!-- Inner right ear -->
    <path d="M 180 -120 Q 230 -250 150 -200" stroke="#fecaca" stroke-width="30" fill="none" stroke-linecap="round"/>

    <!-- Eyes -->
    <circle cx="-80" cy="-30" r="35" fill="#1e293b"/>
    <circle cx="80" cy="-30" r="35" fill="#1e293b"/>

    <!-- Eye highlights -->
    <circle cx="-68" cy="-42" r="12" fill="#ffffff"/>
    <circle cx="92" cy="-42" r="12" fill="#ffffff"/>

    <!-- Nose -->
    <ellipse cx="0" cy="60" rx="40" ry="32" fill="#1e293b"/>

    <!-- Happy mouth -->
    <path d="M -50 100 Q 0 150 50 100" stroke="#1e293b" stroke-width="10" fill="none" stroke-linecap="round"/>

    <!-- Blush -->
    <ellipse cx="-130" cy="40" rx="35" ry="25" fill="#fecaca" opacity="0.6"/>
    <ellipse cx="130" cy="40" rx="35" ry="25" fill="#fecaca" opacity="0.6"/>
  </g>

  <!-- Floating coins -->
  <g>
    <!-- Coin 1 - top right -->
    <circle cx="780" cy="200" r="70" fill="#fbbf24" stroke="#f59e0b" stroke-width="6"/>
    <text x="780" y="225" font-family="Arial" font-size="80" font-weight="bold" fill="#ffffff" text-anchor="middle">$</text>

    <!-- Coin 2 - top left -->
    <circle cx="244" cy="240" r="50" fill="#fbbf24" stroke="#f59e0b" stroke-width="5"/>
    <text x="244" y="260" font-family="Arial" font-size="55" font-weight="bold" fill="#ffffff" text-anchor="middle">$</text>

    <!-- Coin 3 - small sparkle -->
    <circle cx="850" cy="350" r="25" fill="#fcd34d"/>
  </g>
</svg>
